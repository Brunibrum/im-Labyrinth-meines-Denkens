<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Im Labyrinth meines Denkens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080e1a;
  --warm:#f0a860;
  --cool:#58a6ff;
  --bridge:#c090f0;
  --text:#b8c8d8;
  --text-dim:#5a6a7a;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── CANVAS BACKGROUND ── */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── MAIN LAYOUT ── */
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem}

/* ── HERO ── */
.hero{text-align:center;max-width:640px;margin-bottom:3rem}
.hero h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2.4rem,7vw,4.2rem);
  font-weight:400;
  line-height:1.15;
  margin-bottom:0;
  background:linear-gradient(135deg,var(--warm),var(--bridge),var(--cool),var(--warm));
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradientShift 12s ease infinite;
}
@keyframes gradientShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ── CTA ── */
.cta-wrap{text-align:center;margin-bottom:2rem}
.cta{
  display:inline-block;
  padding:14px 36px;
  border-radius:40px;
  border:1px solid rgba(192,144,240,0.3);
  background:rgba(192,144,240,0.08);
  color:#d8c0f0;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:0.95rem;
  font-weight:400;
  letter-spacing:0.3px;
  text-decoration:none;
  cursor:pointer;
  transition:all 0.35s ease;
  position:relative;
  overflow:hidden;
}
.cta:hover{
  background:rgba(192,144,240,0.16);
  border-color:rgba(192,144,240,0.5);
  color:#f0e0ff;
  transform:translateY(-1px);
  box-shadow:0 8px 32px rgba(140,100,220,0.15);
}
.cta::after{
  content:'→';
  display:inline-block;
  margin-left:8px;
  transition:transform 0.3s ease;
}
.cta:hover::after{transform:translateX(4px)}

/* ── FOOTER HINT ── */
.hint{
  font-size:0.75rem;
  color:var(--text-dim);
  text-align:center;
  opacity:0.6;
  line-height:1.6;
}

/* ── ENTRANCE ANIMATIONS ── */
.hero,.cta-wrap,.hint{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.8s ease forwards;
}
.hero{animation-delay:0.2s}
.cta-wrap{animation-delay:0.6s}
.hint{animation-delay:0.9s}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

/* ── MOBILE ── */
@media(max-width:480px){
  .page{padding:1.5rem 1rem}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">
  <div class="hero">
    <h1>Im Labyrinth<br>meines Denkens</h1>
  </div>

  <div class="cta-wrap">
    <a class="cta" href="vortrag-mensch-vs-claude-v15.html">Exploration starten</a>
  </div>

  <p class="hint">33 Themen · frei erkundbar · folge deiner Neugier</p>
</div>

<script>
// ── Subtle animated background: warm & cool particles drifting ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Particles: warm on left, cool on right, bridge in middle
const particles = [];
const N = 60;
for (let i = 0; i < N; i++) {
  const side = i < N/3 ? 0 : i < N*2/3 ? 1 : 2; // warm, cool, bridge
  particles.push({
    x: Math.random() * 1,
    y: Math.random() * 1,
    vx: (Math.random() - 0.5) * 0.0002,
    vy: (Math.random() - 0.5) * 0.0002,
    r: 1 + Math.random() * 2.5,
    side: side,
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.7
  });
}

function getColor(side, alpha) {
  if (side === 0) return `rgba(240,168,96,${alpha})`;
  if (side === 1) return `rgba(88,166,255,${alpha})`;
  return `rgba(192,144,240,${alpha})`;
}

let t = 0;
function draw() {
  ctx.clearRect(0, 0, W, H);
  
  // Subtle radial gradient base
  const g = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.45, W*0.7);
  g.addColorStop(0, 'rgba(20,25,50,0.3)');
  g.addColorStop(1, 'rgba(8,14,26,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  t += 0.008;

  // Draw connections between nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = (a.x - b.x) * W, dy = (a.y - b.y) * H;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120 && a.side !== b.side) {
        const alpha = (1 - dist/120) * 0.06;
        ctx.strokeStyle = `rgba(192,144,240,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(a.x * W, a.y * H);
        ctx.lineTo(b.x * W, b.y * H);
        ctx.stroke();
      }
    }
  }

  // Draw particles
  for (const p of particles) {
    p.x += p.vx + Math.sin(t * p.speed + p.phase) * 0.0001;
    p.y += p.vy + Math.cos(t * p.speed * 0.7 + p.phase) * 0.00008;
    
    // Wrap around
    if (p.x < -0.05) p.x = 1.05;
    if (p.x > 1.05) p.x = -0.05;
    if (p.y < -0.05) p.y = 1.05;
    if (p.y > 1.05) p.y = -0.05;

    const pulse = 0.7 + Math.sin(t * 2 + p.phase) * 0.3;
    const alpha = 0.15 * pulse;
    const x = p.x * W, y = p.y * H;
    
    // Glow
    const glow = ctx.createRadialGradient(x, y, 0, x, y, p.r * 8);
    glow.addColorStop(0, getColor(p.side, alpha * 0.5));
    glow.addColorStop(1, getColor(p.side, 0));
    ctx.fillStyle = glow;
    ctx.fillRect(x - p.r*8, y - p.r*8, p.r*16, p.r*16);
    
    // Core
    ctx.beginPath();
    ctx.arc(x, y, p.r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = getColor(p.side, alpha * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
